<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style lang="less">
      .container1 {
        .left,
        .right {
          width: 200px;
          height: 100px;
          background-color: #ccc;
        }
        .left {
          float: left;
        }

        .right {
          float: right;
        }

        .main {
          height: 100px;
          /* margin: 0 200px; */
          overflow: hidden;
          background-color: #eee;
        }
      }

      .container2 {
        margin: 0 200px;
        height: 100px;

        .main {
          width: 100%;
          height: 100%;
          background-color: #eee;
          float: left;
        }

        .left,
        .right {
          width: 200px;
          height: 100px;
          background-color: #ccc;
        }

        .left {
          float: left;
          margin-left: -100%;
          position: relative;
          left: -200px;
        }

        .right {
          float: left;
          margin-left: -200px;
          position: relative;
          right: -200px;
        }
      }

      .container3 {
        .main {
          float: left;
          width: 100%;
          .main_inner {
            height: 100px;
            margin: 0 200px;

            background-color: #eee;
          }
        }

        .left,
        .right {
          width: 200px;
          height: 100px;
          background-color: #ccc;
        }

        .left {
          float: left;
          margin-left: -100%;
        }

        .right {
          float: left;
          margin-left: -200px;
        }
      }

      .container4 {
        display: flex;

        .main {
          flex: 1;
          height: 100px;
          background-color: #eee;
        }

        .left,
        .right {
          width: 200px;
          height: 100px;
          background-color: #ccc;
        }

        .left {
          order: -1;
        }
        .right {
          order: 1;
        }
      }

      .container5 {
        display: table;
        width: 100%;

        .main,
        .left,
        .right {
          display: table-cell;
        }

        .main {
          height: 100px;
          background-color: #eee;
        }

        .left,
        .right {
          width: 200px;
          height: 100px;
          background-color: #ccc;
        }
      }

      .container6 {
        position: relative;
        width: 100%;

        .main {
          height: 100px;
          background-color: #eee;
          margin: 0 200px;
        }

        .left,
        .right {
          width: 200px;
          height: 100px;
          background-color: #ccc;
          position: absolute;
          top: 0;
        }

        .left {
          left: 0;
        }

        .right {
          right: 0;
        }
      }
    </style>
  </head>
  <body>
    <h1>三栏布局 6大布局方式</h1>
    <!-- 三栏布局  左右定宽 中间自适应 -->
    <h3>三栏布局-float | BFC</h3>
    <div class="container1">
      <div class="left">left</div>
      <div class="right">right</div>
      <div class="main">Main</div>
    </div>
    <!-- 圣杯布局 左右定宽 中间自适应 -->
    <h3>圣杯布局</h3>
    <div class="container2">
      <div class="main">Main</div>
      <div class="left">Left</div>
      <div class="right">Right</div>
    </div>

    <!-- 双飞翼布局 -->
    <h3>双飞翼布局</h3>
    <div class="container3">
      <div class="main">
        <div class="main_inner">Main</div>
      </div>
      <div class="left">Left</div>
      <div class="right">Right</div>
    </div>

    <h3>display: flex</h3>
    <div class="container4">
      <div class="main">Main</div>
      <div class="left">Left</div>
      <div class="right">Right</div>
    </div>

    <h3>display: table-cell</h3>
    <div class="container5">
      <div class="left">Left</div>
      <div class="main">Main</div>
      <div class="right">Right</div>
    </div>

    <h3>postion: absolute</h3>
    <div class="container6">
      <div class="left">Left</div>
      <div class="main">Main</div>
      <div class="right">Right</div>
    </div>
  </body>
</html>
